<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مؤسسة ليان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-md p-10 rounded-3xl shadow-2xl animate__animated animate__zoomIn">
        <div class="text-center mb-10">
            <img src="logo.png" alt="Layan Logo" class="w-24 h-24 mx-auto mb-6 object-contain">
            <h1 class="text-3xl font-bold text-white mb-2">تسجيل الدخول</h1>
            <p class="text-slate-400">لوحة التحكم الإدارية - مؤسسة ليان</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 mr-1">البريد الإلكتروني</label>
                <div class="relative">
                    <input type="email" id="email" required
                        class="w-full bg-slate-800/50 border border-slate-700 text-white p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12 transition-all"
                        placeholder="admin@layan.org">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 mr-1">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full bg-slate-800/50 border border-slate-700 text-white p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12 transition-all"
                        placeholder="••••••••">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>
            </div>

            <div id="otp-group" class="hidden">
                <label class="block text-slate-300 text-sm font-semibold mb-2 mr-1">رمز التحقق (OTP)</label>
                <div class="relative">
                    <input type="text" id="otp"
                        class="w-full bg-slate-800/50 border border-slate-700 text-white p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12 transition-all text-center tracking-widest text-xl"
                        placeholder="123456" maxlength="6">
                    <i class="fas fa-shield-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>
                <p class="text-xs text-blue-400 mt-2 text-center" id="otp-message">تم إرسال رمز التحقق إلى بريدك الإلكتروني.</p>
            </div>

            <div class="flex items-center justify-between text-sm" id="options-group">
                <label class="flex items-center text-slate-400 cursor-pointer group">
                    <input type="checkbox" class="hidden peer">
                    <div
                        class="w-5 h-5 border-2 border-slate-700 rounded mr-2 peer-checked:bg-blue-600 peer-checked:border-blue-600 transition-all flex items-center justify-center">
                        <i class="fas fa-check text-white text-[10px] hidden peer-checked:block"></i>
                    </div>
                    <span>تذكرني</span>
                </label>
                <a href="#" class="text-blue-400 hover:text-blue-300 transition-all">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-700 transform hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-blue-600/20 flex justify-center items-center gap-2">
                <span>دخول النظام</span>
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-800 text-center">
            <a href="index.html"
                class="text-slate-500 hover:text-slate-300 flex items-center justify-center gap-2 transition-all">
                <i class="fas fa-arrow-right"></i> العودة للموقع الرئيسي
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let isOtpStep = false;

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const submitBtn = document.getElementById('submit-btn');

            if (!isOtpStep) {
                // Step 1: Login
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
                submitBtn.disabled = true;

                const response = await API.post('login', { email, password });
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'دخول النظام';

                if (response && response.success && response.requireOTP) {
                    isOtpStep = true;
                    document.getElementById('email').parentElement.parentElement.classList.add('hidden');
                    document.getElementById('password').parentElement.parentElement.classList.add('hidden');
                    document.getElementById('options-group').classList.add('hidden');
                    document.getElementById('otp-group').classList.remove('hidden');
                    document.getElementById('otp').required = true;
                    submitBtn.innerHTML = 'تأكيد الرمز';
                } else if (response && response.error) {
                    alert(response.error);
                } else {
                    alert('حدث خطأ في الاتصال بالسيرفر. (تأكد من تحديث رابط السكربت)');
                }
            } else {
                // Step 2: Verify OTP
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التأكيد...';
                submitBtn.disabled = true;

                const response = await API.post('verifyOTP', { email, otp });

                submitBtn.disabled = false;
                submitBtn.innerHTML = 'تأكيد الرمز';

                if (response && response.success) {
                    localStorage.setItem('layan_user', JSON.stringify(response.user));
                    window.location.href = 'admin.html';
                } else {
                    alert(response.error || 'رمز غير صحيح.');
                }
            }
        });
    </script>
</body>

</html>
